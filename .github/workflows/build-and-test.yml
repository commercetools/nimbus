name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    container:
      # Make sure to grab the latest version of the Playwright image
      # https://playwright.dev/docs/docker#pull-the-image
      image: mcr.microsoft.com/playwright:v1.59.1-noble

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Installing dependencies and building packages
        uses: ./.github/actions/ci

      - name: Bundle size check
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/bundle-size
        with:
          gh-token: ${{ github.token }}
          pr-number: ${{ github.event.pull_request.number }}

      - name: Validate OpenSpec proposals
        run: pnpm openspec validate --all --strict

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck:strict

      - name: Check package shape
        run: pnpm check:package-shape

      - name: Clean temp before tests
        run: rm -rf /tmp/* || true
        shell: bash

      - name: Run tests
        run: pnpm test
        timeout-minutes: 10
