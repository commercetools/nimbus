name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    container:
      # Make sure to grab the latest version of the Playwright image
      # https://playwright.dev/docs/docker#pull-the-image
      image: mcr.microsoft.com/playwright:v1.59.1-noble

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install GitHub CLI
        if: github.event_name == 'pull_request'
        run: |
          (type -p wget >/dev/null || (apt-get update && apt-get install -y wget)) \
          && mkdir -p -m 755 /etc/apt/keyrings \
          && out=$(mktemp) && wget -nv -O "$out" https://cli.github.com/packages/githubcli-archive-keyring.gpg \
          && cat "$out" | tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
          && chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && apt-get update \
          && apt-get install -y gh

      - name: Installing dependencies and building packages
        uses: ./.github/actions/ci

      - name: Fetch baseline from comment chain
        if: github.event_name == 'pull_request'
        id: baseline
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASELINE_PR=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state merged \
            --label bundle-sizes \
            --json number \
            --limit 1 \
            --jq '.[0].number // empty')

          if [ -n "$BASELINE_PR" ]; then
            echo "Found baseline PR: #${BASELINE_PR}"

            BASELINE_DATA=$(gh api \
              "repos/${GITHUB_REPOSITORY}/issues/${BASELINE_PR}/comments" \
              --jq '.[] | select(.body | contains("bundle-sizes-comment")) | .body' \
              | grep -o '<!-- bundle-sizes-data-v1: .* -->' \
              | sed 's/<!-- bundle-sizes-data-v1: //' \
              | sed 's/ -->//')

            if [ -n "$BASELINE_DATA" ]; then
              echo "source=comment-chain" >> "$GITHUB_OUTPUT"
              echo "data=${BASELINE_DATA}" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Could not parse data block from PR #${BASELINE_PR} comment. Falling back to bootstrap file."
              echo "source=bootstrap" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No labeled merged PR found. Using bootstrap baseline (bundle-sizes.json)."
            echo "source=bootstrap" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for approval label
        if: github.event_name == 'pull_request'
        id: approval
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh pr view "${{ github.event.pull_request.number }}" \
            --repo "$GITHUB_REPOSITORY" \
            --json labels \
            --jq '.labels[].name')

          if echo "$LABELS" | grep -q '^bundle-size-approved$'; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Measure and compare bundle sizes
        if: github.event_name == 'pull_request'
        id: bundle-size-check
        env:
          BUNDLE_SIZE_BASELINE: ${{ steps.baseline.outputs.source == 'comment-chain' && steps.baseline.outputs.data || '' }}
          BUNDLE_SIZE_APPROVED: ${{ steps.approval.outputs.approved }}
        run: |
          set +e
          node scripts/check-bundle-size.mjs --json > /tmp/bundle-sizes-result.json 2>/tmp/bundle-sizes-stderr.txt
          EXIT_CODE=$?
          set -e

          cat /tmp/bundle-sizes-stderr.txt >&2 || true
          cat /tmp/bundle-sizes-result.json
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

      - name: Post bundle size comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          JSON_FILE="/tmp/bundle-sizes-result.json"
          if [ ! -f "$JSON_FILE" ]; then
            echo "::error::No bundle size result found"
            exit 1
          fi

          COMMENT_BODY=$(node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('$JSON_FILE', 'utf-8'));
            const lines = [];
            lines.push('<!-- bundle-sizes-comment -->');
            lines.push('## Bundle Size Report');
            lines.push('');
            lines.push('| Package | Format | Current | Baseline | Delta | Status |');
            lines.push('|---------|--------|--------:|---------:|------:|--------|');

            for (const [pkg, formats] of Object.entries(data.packages)) {
              const info = formats.dist;
              const current = info.current != null ? (info.current / 1024).toFixed(1) + ' KB' : '—';
              const baseline = info.baseline != null ? (info.baseline / 1024).toFixed(1) + ' KB' : '—';
              const delta = info.delta_pct != null ? (info.delta_pct >= 0 ? '+' : '') + info.delta_pct.toFixed(1) + '%' : info.status;
              const icon = info.status === 'ok' ? ':white_check_mark:' : info.status === 'fail' ? ':x:' : info.status === 'approved' ? ':warning:' : ':new:';
              lines.push('| ' + pkg + ' | dist | ' + current + ' | ' + baseline + ' | ' + delta + ' | ' + icon + ' ' + info.status + ' |');
            }

            lines.push('');
            lines.push('Baseline source: **' + data.baseline_source + '**');
            if (data.has_failures) {
              lines.push('');
              lines.push('> :x: **One or more packages exceeded their size budget.**');
              lines.push('> To approve this increase, apply the \\\`bundle-size-approved\\\` label and re-run CI.');
            }

            const sizes = {};
            for (const [pkg, formats] of Object.entries(data.packages)) {
              sizes[pkg] = { dist: formats.dist.current };
            }
            lines.push('');
            lines.push('<!-- bundle-sizes-data-v1: ' + JSON.stringify(sizes) + ' -->');

            console.log(lines.join('\n'));
          ")

          EXISTING_COMMENT_ID=$(gh api \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("bundle-sizes-comment")) | .id' \
            | head -1)

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${EXISTING_COMMENT_ID}" \
              -f body="$COMMENT_BODY"
            echo "Updated existing comment #${EXISTING_COMMENT_ID}"
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -f body="$COMMENT_BODY"
            echo "Posted new comment"
          fi

      - name: Fail if bundle size thresholds exceeded
        if: github.event_name == 'pull_request' && steps.bundle-size-check.outputs.exit_code != '0' && steps.approval.outputs.approved != 'true'
        run: |
          echo "::error::Bundle size check failed. Apply the 'bundle-size-approved' label to approve."
          exit 1

      - name: Validate OpenSpec proposals
        run: pnpm openspec validate --all --strict

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck:strict

      - name: Clean temp before tests
        run: rm -rf /tmp/* || true
        shell: bash

      - name: Run tests
        run: pnpm test
        timeout-minutes: 10
