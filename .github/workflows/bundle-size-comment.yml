name: Bundle Size Post-Merge Label

on:
  pull_request:
    types: [closed]

permissions:
  pull-requests: write

jobs:
  post-merge-label:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Add bundle-sizes label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "$GITHUB_REPOSITORY" \
            --add-label "bundle-sizes"
