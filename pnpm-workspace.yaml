packages:
  - packages/*
  - apps/*

catalog:
  '@types/culori': ^4.0.1

catalogMode: strict

# --- pnpm install & supply-chain settings (made explicit) ---
# pnpm 11 ships these as built-in defaults. They are pinned here so the repo's
# install behavior is visible and version-independent rather than silently
# inherited from whichever pnpm version happens to be running. Values below
# mirror pnpm 11's defaults, so this is documentation, not a behavior change —
# with one deliberate exception noted on minimumReleaseAgeStrict.

# Delay resolving newly published versions until they are at least this many
# minutes old (supply-chain protection: gives the ecosystem time to catch a
# compromised release). pnpm 11 default: 1440 (24h). Set to 0 to disable.
minimumReleaseAge: 1440
# Because minimumReleaseAge is set EXPLICITLY, pnpm would otherwise flip this to
# `true` and FAIL resolution when no old-enough version satisfies a range. We
# pin it to `false` to keep the softer default behavior (skip/warn, don't error).
minimumReleaseAgeStrict: false
# Don't apply the age gate to packages whose registry metadata has no publish
# time (avoids spurious failures on such packages).
minimumReleaseAgeIgnoreMissingTime: true
# Fail the install if any dependency has an unreviewed build (postinstall)
# script — every builder must be an explicit decision in `allowBuilds` below.
strictDepBuilds: true
# Restrict "exotic" sources (git repos, direct tarball URLs) to direct
# dependencies only; block them as transitive subdeps.
blockExoticSubdeps: true
# Verify dependencies are present/consistent before `pnpm run` / `pnpm exec`.
verifyDepsBeforeRun: install
# Skip full re-resolution when the manifest + lockfile are unchanged.
optimisticRepeatInstall: true

# Build-script allow list. pnpm 11 removed onlyBuiltDependencies /
# neverBuiltDependencies / ignoredBuiltDependencies in favor of this single
# map: `true` = allowed to run build scripts, `false` = explicitly denied.
# Anything not listed is treated as unreviewed and (with strictDepBuilds) fails
# the install. The `true` entries were the former onlyBuiltDependencies list;
# the `false` entries were previously reported as "Ignored build scripts".
allowBuilds:
  "@bundled-es-modules/glob": true
  "@swc/core": true
  es5-ext: true
  esbuild: true
  msw: true
  style-dictionary: true
  "@fission-ai/openspec": false
  "@modelcontextprotocol/ext-apps": false
  core-js-pure: true
  sharp: set this to true or false

overrides:
  rollup: "catalog:tooling"
  "@babel/runtime": "catalog:tooling"
  prismjs: "^1.30.0"
  typescript: "catalog:tooling"
  react-aria: "catalog:react"
  react-aria-components: "catalog:react"
  react-stately: "catalog:react"
  "@react-aria/interactions": "catalog:react"
  "brace-expansion@<2": "^2.0.3"
  "brace-expansion@2": "~2.0.3"
  "brace-expansion@>=4.0.0 <5.0.6": ">=5.0.6"
  mdast-util-to-hast: "^13.2.1"
  # js-yaml 3.x security floor — >=3.15.0 fixes GHSA-h67p-54hq-rp68
  # (quadratic-complexity DoS in merge-key handling).
  js-yaml: "^3.15.0"
  # Force the transitively-pulled dompurify (3.4.5 via @commercetools-uikit/icons
  # + rich-text-utils) up to the vetted catalog version, clearing the dompurify
  # GHSA cluster (…-cmwh-pvxp-8882, …-rp9w-3fw7-7cwq, …-76mc-f452-cxcm, etc.).
  dompurify: "catalog:utils"
  qs: ">=6.15.2"
  "minimatch@>=3.0.0 <3.1.4": "3.1.4"
  svgo: ">=3.3.3"
  hono: ">=4.12.21"
  esbuild: ">=0.28.1"
  shell-quote: ">=1.8.4"
  "@babel/core": "catalog:tooling"
  "@hono/node-server": ">=1.19.13"
  fast-uri: ">=3.1.2"
  ip-address: ">=10.1.1"
  postcss: ">=8.5.10"
  "lodash@<4.18.0": ">=4.18.0"
  "lodash-es@<4.18.0": ">=4.18.0"
  "ajv@>=8.0.0 <8.18.0": ">=8.18.0"
  "minimatch@>=10.0.0 <10.2.3": ">=10.2.3"
  flatted: ">=3.4.2"
  undici: ">=7.28.0 <8"
  "picomatch@<2.3.2": ">=2.3.2"
  "picomatch@>=4.0.0 <4.0.4": ">=4.0.4"
  "yaml@1": "1.10.3"
  "yaml@2": ">=2.8.3"
  "path-to-regexp@>=8.0.0 <8.4.0": ">=8.4.0"
  "happy-dom@<20.8.9": ">=20.8.9"
  jsdom: "catalog:tooling"
  # Keep every Storybook copy off 10.5.0 (see the pin note in catalogs.tooling).
  # These are pulled transitively (e.g. @github-ui/storybook-addon-performance-panel
  # → @storybook/react) where the catalog pins don't reach.
  "@storybook/react": "10.4.6"
  "@storybook/react-dom-shim": "10.4.6"
  "@storybook/builder-vite": "10.4.6"
  "@storybook/csf-plugin": "10.4.6"

catalogs:
  tooling:
    "@figma/code-connect": ^1.4.9
    "@fission-ai/openspec": ^1.6.0
    eslint-plugin-react-hooks: ^7.1.1
    globals: ^17.7.0
    glob: ^13.0.6
    typescript: ~5.9.3
    typescript-eslint: ^8.64.0
    tsup: ^8.5.1
    tsx: ^4.23.1
    "@arethetypeswrong/cli": ^0.18.5
    publint: ^0.3.21
    "@commercetools-frontend/ui-kit": ^20.6.4
    "@modelcontextprotocol/inspector": ^0.21.2
    "@babel/core": ^7.29.7
    "@babel/runtime": ^7.29.7
    "@babel/preset-typescript": ^7.29.7
    "@eslint/js": ^10.0.1
    "@react-types/shared": ^3.36.0
    eslint: ^10.7.0
    eslint-config-prettier: ^10.1.8
    eslint-plugin-prettier: ^5.5.6
    eslint-plugin-react-refresh: ^0.5.3
    express-rate-limit: ^8.5.2
    prettier: ^3.9.5
    "@preconstruct/cli": ^2.8.13
    "@vitejs/plugin-react": ^6.0.3
    "@vitejs/plugin-react-swc": ^4.3.1
    vite: ^8.1.4
    webpack: ^5.108.4
    webpack-cli: ^7.2.1
    vite-bundle-analyzer: ^1.3.9
    vite-plugin-dts: ^5.0.3
    rollup: ^4.62.2
    "@vitest/browser": ^4.1.10
    "@vitest/browser-playwright": ^4.1.10
    "@vitest/coverage-v8": ^4.1.10
    "@testing-library/dom": 10.4.1
    "@testing-library/jest-dom": ^6.9.1
    "@testing-library/user-event": ^14.6.1
    "@testing-library/react": ^16.3.2
    playwright: ^1.61.1
    vitest: ^4.1.10
    # Storybook pinned exact at 10.4.6: 10.5.0 wraps HTMLElement.focus in its CSF
    # runtime and throws "Illegal invocation" when react-aria's
    # setupGlobalFocusEvents calls it, breaking browser story tests (flaky set of
    # files per run). Exact pins + the @storybook/* overrides below keep the whole
    # ecosystem — including the copies pulled transitively by the @github-ui /
    # @vueless addons — off 10.5.0. Reconfirmed on 2026-07-15.
    storybook: 10.4.6
    eslint-plugin-storybook: 10.4.6
    "@storybook/addon-a11y": 10.4.6
    "@storybook/addon-docs": 10.4.6
    "@storybook/addon-vitest": 10.4.6
    "@storybook/react-vite": 10.4.6
    "@vueless/storybook-dark-mode": ^10.0.8
    "@github-ui/storybook-addon-performance-panel": ^1.1.4
    jsdom: 29.0.1 # pinned: 29.0.2+ breaks Chakra/Emotion CSS in JSDOM (style assertions return padding: 0); reconfirmed against 29.1.0 on 2026-04-29
  react:
    "@types/react": ^19.2.17
    "@types/react-dom": ^19.2.3
    react: ^19.0.0
    react-dom: ^19.0.0
    "@emotion/react": ^11.14.0
    "@emotion/is-prop-valid": ^1.4.0
    "@chakra-ui/cli": ^3.36.0
    "@chakra-ui/react": ^3.36.0
    next-themes: ^0.4.6
    react-aria: 3.50.0
    react-aria-components: 1.19.0
    react-stately: 3.48.0
    "@react-aria/interactions": 3.28.1
    "@react-aria/utils": 3.34.1
    "@react-aria/optimize-locales-plugin": 2.0.0
    "@internationalized/date": ^3.12.2
    "@internationalized/string": ^3.2.9
    "@internationalized/string-compiler": ^3.4.1
  utils:
    dequal: ^2.0.3
    dotenv: ^17.4.2
    dompurify: ^3.4.12
    lodash: ^4.18.1
    "@types/lodash": ^4.17.24
    "@types/node": ^24.13.3
    zod: ^4.4.3
  # Markdown rendering stack for the Markdown component (react-markdown +
  # remark plugins). Grouped here so the whole pipeline is versioned together.
  # Markdown is safe by default (no raw HTML), so no rehype-raw/rehype-sanitize;
  # custom component tags are materialized by a Nimbus-owned remark plugin.
  # Note: these are bundled into @commercetools/nimbus, not externalized —
  # see packages/nimbus/vite.config.ts.
  markdown:
    react-markdown: ^10.1.0
    remark-gfm: ^4.0.1
    remend: ^1.3.0
